name: Nightly dependency update

on:
  schedule:
    # Runs at 02:30 UTC every day (offset from GitHub to avoid simultaneous runs)
    - cron: "30 2 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  update-deps:
    name: Update deps & quality gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITEA_TOKEN || github.token }}

      - name: Install Linux GUI system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable (rustfmt + clippy + cross targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-gnu,x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Update dependencies
        run: cargo update

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings -A deprecated

      - name: Run tests
        run: cargo test --workspace --all-features --all-targets

      # ── Cross-compile checks ─────────────────────────────────────────────────
      # Verify platform-specific code (Windows DeviceIoControl, macOS diskutil)
      # type-checks correctly from the Linux runner — no Windows/macOS runner needed.
      - name: Install mingw-w64 (for Windows cross-check)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends mingw-w64

      - name: cargo check core — x86_64-pc-windows-gnu
        run: cargo check -p flashkraft-core --target x86_64-pc-windows-gnu

      - name: cargo check core — x86_64-apple-darwin
        run: cargo check -p flashkraft-core --target x86_64-apple-darwin

      - name: cargo check core — aarch64-apple-darwin
        run: cargo check -p flashkraft-core --target aarch64-apple-darwin

      - name: Check for Cargo.lock changes
        id: diff
        run: |
          if git diff --quiet Cargo.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated Cargo.lock
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@noreply.gitea"
          git add Cargo.lock
          git commit -m "chore: nightly dependency update $(date -u '+%Y-%m-%d')"
          git push origin main
          echo "✅ Cargo.lock updated and pushed."

      - name: Nothing to update
        if: steps.diff.outputs.changed == 'false'
        run: echo "✅ All dependencies already up to date — nothing to commit."
