[package]
name = "flashkraft"
version = "0.3.2"
edition = "2021"
authors = ["Your Name"]
description = "An OS Imager app similar to Balena-Etcher written in Rust with the Iced UI Framework"
license = "MIT"
repository = "https://github.com/sorinirimies/flashkraft"
categories = ["gui", "command-line-utilities", "filesystem"]
keywords = ["imager", "disk", "usb", "iso", "flash"]

[lib]
name = "flashkraft"
path = "src/lib.rs"

[[bin]]
name = "flashkraft"
path = "src/main.rs"

[dependencies]
iced = { version = "0.13.1", features = ["advanced", "canvas"] }
iced_aw = "0.12.2"
iced_fonts = { version = "0.1", features = ["bootstrap"] }
rfd = "0.15"
sysinfo = "0.30"
futures = "0.3"
futures-timer = "3.0"
sled = "0.34"
dirs = "5.0"

[profile.release]
opt-level = 3
lto = true
