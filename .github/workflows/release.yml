name: Release

on:
  push:
    tags:
      - "v*"
  # Manual fallback — trigger from the GitHub Actions UI if the tag push
  # ever silently skips or a re-run is needed without re-pushing the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.5.0) — must already exist on the repo"
        required: true
        default: ""

permissions:
  contents: write
  packages: write

# One release run at a time per tag.  Re-pushing the same tag cancels the
# previous run instead of queuing a duplicate.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 0. Validate trigger ──────────────────────────────────────────────────────
  # Resolve the effective tag from either a tag push or a manual dispatch, then
  # validate it matches vX.Y.Z before spending time on any build work.
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve and validate tag
        id: resolve
        run: |
          # For a tag push  → github.ref_name is the tag (e.g. "v0.5.0")
          # For manual runs → the user supplies it via the `tag` input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          echo "Resolved tag: ${TAG}"

          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Tag '${TAG}' does not match vX.Y.Z — aborting."
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "✅ Tag ${TAG} (version ${VERSION}) is valid."

  # ── 1. Quality gate ──────────────────────────────────────────────────────────
  test:
    name: Test & lint
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Linux GUI system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable (rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (workspace)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings -A deprecated

      - name: Run tests (workspace)
        run: cargo test --workspace --all-features

  # ── 2. Binary builds ─────────────────────────────────────────────────────────
  # Build GUI and TUI release binaries for each target platform.
  # The matrix produces one job per (target, runner) combination so builds
  # run in parallel.
  build:
    name: Build — ${{ matrix.target }}
    needs: [validate, test]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 (dynamic — standard distro binary) ─────────────────
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            gui_binary: flashkraft
            tui_binary: flashkraft-tui
            suffix: ""
            install_gui_libs: true

          # ── Windows x86_64 (MSVC) ────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            gui_binary: flashkraft
            tui_binary: flashkraft-tui
            suffix: ".exe"
            install_gui_libs: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      # ── System libraries (GUI only) ─────────────────────────────────────────
      - name: Install Linux GUI system libraries
        if: matrix.install_gui_libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ── Build TUI (all targets) ──────────────────────────────────────────────
      - name: Build TUI release binary
        run: cargo build --release -p flashkraft-tui --target ${{ matrix.target }}

      # ── Build GUI ───────────────────────────────────────────────────────────
      - name: Build GUI release binary
        if: matrix.gui_binary != ''
        run: cargo build --release -p flashkraft --target ${{ matrix.target }}

      # ── Stage artifacts ──────────────────────────────────────────────────────
      - name: Create dist directory
        run: mkdir dist

      - name: Stage TUI artifact
        run: cp target/${{ matrix.target }}/release/flashkraft-tui${{ matrix.suffix }} dist/flashkraft-tui-${{ matrix.target }}${{ matrix.suffix }}

      - name: Stage GUI artifact
        if: matrix.gui_binary != ''
        run: cp target/${{ matrix.target }}/release/flashkraft${{ matrix.suffix }} dist/flashkraft-gui-${{ matrix.target }}${{ matrix.suffix }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/
          retention-days: 1

  # ── 3. GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
          fetch-depth: 0

      - name: Install git-cliff
        run: cargo install git-cliff --locked

      - name: Generate changelog for this release
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          VERSION="${{ needs.validate.outputs.version }}"
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          {
            echo "# FlashKraft ${VERSION}"
            echo ""
            echo "## 🚀 What's New"
            echo ""
          } > RELEASE_NOTES.md

          if [ -n "${LAST_TAG}" ]; then
            git-cliff --config cliff.toml "${LAST_TAG}".."${TAG}" \
              --strip header >> RELEASE_NOTES.md
          else
            git-cliff --config cliff.toml --tag "${TAG}" \
              --strip header >> RELEASE_NOTES.md
          fi

          {
            echo ""
            echo "## 📦 Installation"
            echo ""
            echo "### Desktop GUI (Iced)"
            echo "\`\`\`bash"
            echo "cargo install flashkraft"
            echo "\`\`\`"
            echo ""
            echo "### Terminal UI (Ratatui)"
            echo "\`\`\`bash"
            echo "cargo install flashkraft-tui"
            echo "\`\`\`"
            echo ""
            echo "Or download a pre-built binary below."
          } >> RELEASE_NOTES.md

          # Also update the full CHANGELOG.md
          git-cliff --config cliff.toml --output CHANGELOG.md

      # Download every artifact uploaded by the build matrix
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: binaries-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/*
            LICENSE
            README.md
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 4. Publish to crates.io ──────────────────────────────────────────────────
  # Order matters: core must be published first because gui and tui depend on it.
  # flashkraft (crates/flashkraft-gui) is published as `flashkraft` (the GUI binary).
  # flashkraft-tui is published as `flashkraft-tui` (the TUI binary).
  publish:
    name: Publish to crates.io
    needs: [validate, release]
    runs-on: ubuntu-latest
    # Note: if CRATES_IO_TOKEN secret is absent, the publish steps will fail
    # with a clear auth error. Remove this job from `needs` to skip publishing.
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Linux GUI system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      # ── Step 1: publish flashkraft-core ─────────────────────────────────────
      # gui and tui both depend on this; it must hit the crates.io index first.
      - name: Publish flashkraft-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          if cargo info flashkraft-core@${VERSION} 2>/dev/null | grep -q "^flashkraft-core"; then
            echo "⏭️  flashkraft-core@${VERSION} already on crates.io — skipping."
          else
            echo "📦 Copying README.md into crates/flashkraft-core…"
            cp README.md crates/flashkraft-core/README.md
            echo "📦 Publishing flashkraft-core…"
            cargo publish -p flashkraft-core --token "${CARGO_REGISTRY_TOKEN}"
            echo "⏳ Waiting 30 s for the index to propagate…"
            sleep 30
          fi

      # ── Step 2: publish flashkraft (GUI) ────────────────────────────────────
      - name: Publish flashkraft (GUI)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          if cargo info flashkraft@${VERSION} 2>/dev/null | grep -q "^flashkraft"; then
            echo "⏭️  flashkraft@${VERSION} already on crates.io — skipping."
          else
            cp README.md crates/flashkraft-gui/README.md
            echo "📦 Publishing flashkraft (GUI)…"
            cargo publish -p flashkraft --token "${CARGO_REGISTRY_TOKEN}"
            echo "⏳ Waiting 20 s for the index to propagate…"
            sleep 20
          fi

      # ── Step 3: publish flashkraft-tui ──────────────────────────────────────
      - name: Publish flashkraft-tui
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          if cargo info flashkraft-tui@${VERSION} 2>/dev/null | grep -q "^flashkraft-tui"; then
            echo "⏭️  flashkraft-tui@${VERSION} already on crates.io — skipping."
          else
            echo "📦 Copying README.md into crates/flashkraft-tui…"
            cp README.md crates/flashkraft-tui/README.md
            echo "📦 Publishing flashkraft-tui…"
            cargo publish -p flashkraft-tui --token "${CARGO_REGISTRY_TOKEN}"
          fi
          echo "✅ Publish step complete."
