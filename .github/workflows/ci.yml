name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

env:
  CARGO_TERM_COLOR: always

# Cancel in-progress runs on the same branch/PR so we never queue up stale
# jobs after a force-push.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# ── Shared setup ───────────────────────────────────────────────────────────────
# Most jobs need the native GUI libraries that Iced links against on Linux.
# We install them once here and reference the step from each job.
# TUI jobs (ratatui/crossterm) are pure-Rust and need no extra system deps.

jobs:
  # ── 1. Formatting ────────────────────────────────────────────────────────────
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting (workspace)
        run: cargo fmt --all -- --check

  # ── 2. Clippy ────────────────────────────────────────────────────────────────
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run clippy (workspace)
        uses: clechasseur/rs-clippy-check@v4
        with:
          args: --workspace --all-targets --all-features

  # ── 3. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Generate lockfile (if absent)
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile

      # Run the full test suite.  GUI rendering tests are compile-only on a
      # headless runner (they never open a window), so they pass fine.
      - name: cargo test --workspace
        run: cargo test --workspace --all-features --all-targets

  # ── 4. Build (dev) ───────────────────────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build core (dev)
        run: cargo build -p flashkraft-core

      - name: Build GUI (dev)
        run: cargo build -p flashkraft-gui

      - name: Build TUI (dev)
        run: cargo build -p flashkraft-tui

  # ── 5. Docs ──────────────────────────────────────────────────────────────────
  doc:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      # Use nightly for doc(cfg) and intra-doc link checking.
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      # Build docs for the two published crates (core is an internal dep).
      - name: cargo doc (flashkraft-gui)
        run: cargo doc --no-deps -p flashkraft-gui --all-features
        env:
          RUSTDOCFLAGS: --cfg docsrs -D warnings

      - name: cargo doc (flashkraft-tui)
        run: cargo doc --no-deps -p flashkraft-tui --all-features
        env:
          RUSTDOCFLAGS: --cfg docsrs -D warnings

  # ── 6. Windows compile check ─────────────────────────────────────────────────
  # Verifies the workspace compiles on Windows without running a full release
  # build or needing a Windows release runner.  Uses cargo check (no codegen)
  # so it's fast.  The GUI crate is excluded — Iced's X11/Wayland deps don't
  # apply on Windows and would need a different feature set to compile there.
  check-windows:
    name: check (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: windows

      - name: cargo check flashkraft-core (Windows)
        run: cargo check -p flashkraft-core --all-features

      - name: cargo check flashkraft-tui (Windows)
        run: cargo check -p flashkraft-tui --all-features
